name: Oracle ARM Grabber
on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Install OCI CLI
        run: |
          bash -c "$(curl -L https://raw.githubusercontent.com/oracle/oci-cli/master/scripts/install/install.sh)" -- --accept-all-defaults
          echo "/home/runner/bin" >> $GITHUB_PATH

      - name: Configure OCI CLI
        run: |
          mkdir -p ~/.oci
          # สร้างไฟล์ Key แยกต่างหาก
          echo "${{ secrets.OCI_PRIVATE_KEY }}" > ~/.oci/key.pem
          chmod 600 ~/.oci/key.pem
          
          # สร้างไฟล์ Config ให้ถูกต้องตามมาตรฐาน Oracle
          cat <<EOF > ~/.oci/config
          [DEFAULT]
          user=${{ secrets.OCI_USER_ID }}
          fingerprint=${{ secrets.OCI_FINGERPRINT }}
          tenancy=${{ secrets.OCI_TENANCY_ID }}
          region=${{ secrets.OCI_REGION }}
          key_file=~/.oci/key.pem
          EOF
          chmod 600 ~/.oci/config

      - name: Run Stack Job
        run: |
          ~/bin/oci resource-manager job create-apply-job \
            --stack-id ${{ secrets.OCI_STACK_ID }} \
            --execution-plan-strategy FROM_STACK
