name: Oracle ARM Grabber
on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Install OCI CLI
        run: |
          bash -c "$(curl -L https://raw.githubusercontent.com/oracle/oci-cli/master/scripts/install/install.sh)" -- --accept-all-defaults
          echo "/home/runner/bin" >> $GITHUB_PATH

      - name: Configure OCI CLI
        run: |
          mkdir -p ~/.oci
          printf "%s\n" "${{ secrets.OCI_PRIVATE_KEY }}" > ~/.oci/key.pem
          chmod 600 ~/.oci/key.pem
          cat <<EOF > ~/.oci/config
          [DEFAULT]
          user=${{ secrets.OCI_USER_ID }}
          fingerprint=${{ secrets.OCI_FINGERPRINT }}
          tenancy=${{ secrets.OCI_TENANCY_ID }}
          region=${{ secrets.OCI_REGION }}
          key_file=~/.oci/key.pem
          EOF
          chmod 600 ~/.oci/config

      - name: Run Stack Job
        run: |
          # ใช้คำสั่งพื้นฐานสร้าง Job โดยระบุ Operation เป็น APPLY ตรงๆ
          # วิธีนี้จะดึงแผนล่าสุดจาก Stack อัตโนมัติโดยไม่ต้องใช้ execution-plan-strategy
          ~/bin/oci resource-manager job create \
            --stack-id "${{ secrets.OCI_STACK_ID }}" \
            --operation "APPLY" \
            --wait-for-state SUCCEEDED \
            --wait-for-state FAILED
