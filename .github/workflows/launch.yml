name: Oracle ARM Grabber
on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Setup OCI CLI
        uses: oracle-actions/setup-oci-cli@v1
        with:
          user: ${{ secrets.OCI_USER_ID }}
          tenancy: ${{ secrets.OCI_TENANCY_ID }}
          fingerprint: ${{ secrets.OCI_FINGERPRINT }}
          region: ${{ secrets.OCI_REGION }}
          key_content: ${{ secrets.OCI_PRIVATE_KEY }}

      - name: Run Stack Job
        run: |
          oci resource-manager job create-apply-job \
            --stack-id ${{ secrets.OCI_STACK_ID }} \
            --execution-plan-strategy FROM_STACK
